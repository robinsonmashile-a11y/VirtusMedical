# ──────────────────────────────────────────────────────────────────────────────
# CadenceWorks — Configuration Template
# Copy this file to config.ini and fill in your real values.
# NEVER commit config.ini to git — it is in .gitignore.
# ──────────────────────────────────────────────────────────────────────────────

[twilio]
account_sid = YOUR_TWILIO_ACCOUNT_SID
auth_token  = YOUR_TWILIO_AUTH_TOKEN
from_number = whatsapp:+14155238886

[practice]
name         = Virtus Health & Medical
currency     = R
country_code = +27
doctor_notify_number = 0214391555

[reminder_agent]
high_risk_threshold   = 70
medium_risk_threshold = 45
high_risk_schedule    = 48, 2
medium_risk_schedule  = 24
poll_interval_minutes = 15

[templates]
cancel_number = +27 21 439 1555

reminder_72hr =
    Hi {patient_name} 👋

    This is a reminder from *Virtus Health & Medical*.

    You have a *{appt_type}* with *{provider}* in 48 hours:
    📅 {appt_date} at {appt_time}
    📍 3rd Floor, The Point Mall, Sea Point

    Please reply *CONFIRM* to confirm or *CANCEL* to cancel.
    To reschedule, call us on +27 21 439 1555.

reminder_24hr =
    Hi {patient_name} 👋

    Your appointment at *Virtus Health* is *tomorrow*:
    📅 {appt_date} at {appt_time} with {provider}

    Reply *CONFIRM* to confirm or *CANCEL* if you can't make it.
    We have patients waiting for your slot 🙏

reminder_4hr =
    Hi {patient_name} — see you *today* at {appt_time} with {provider}!

    📍 Virtus Health, 3rd Floor The Point Mall, Sea Point

    Can't make it? Please let us know ASAP on +27 21 439 1555
    so we can give your slot to another patient.

confirmed_reply =
    ✅ Confirmed! See you at {appt_time} on {appt_date}.

    — Virtus Health & Medical

cancelled_reply =
    No problem {patient_name}, your appointment has been cancelled.

    To rebook, WhatsApp or call us on +27 21 439 1555.

    — Virtus Health & Medical
